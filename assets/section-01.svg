<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 64" width="100%" height="100%">
  <defs>
    <linearGradient id="bar-bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#111827" />
      <stop offset="100%" stop-color="#0b0f19" />
    </linearGradient>
    <linearGradient id="line-glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff75a0" />
      <stop offset="50%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="rgba(0, 242, 254, 0.2)" />
    </linearGradient>
  </defs>

  <rect width="1000" height="52" y="6" rx="8" fill="url(#bar-bg)" stroke="rgba(255, 117, 160, 0.25)" stroke-width="1" />
  <rect x="0" y="6" width="6" height="52" rx="3" fill="#ff75a0" />

  <!-- Left: Number & English Title -->
  <text x="24" y="37" font-family="'JetBrains Mono', monospace" font-size="15" font-weight="800" fill="#ff75a0">
    01 //
  </text>
  <text x="74" y="36" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="15" font-weight="800" fill="#ffffff" letter-spacing="1.5">
    CHARACTER PROFILE &amp; ATTRIBUTE MATRIX
  </text>

  <!-- Center Glowing Cyber Connector Line -->
  <line x1="430" y1="32" x2="760" y2="32" stroke="url(#line-glow)" stroke-width="1.5" stroke-dasharray="4 3" />

  <!-- Right: Japanese Subtitle (Right-Aligned) -->
  <text x="965" y="36" font-family="'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif" font-size="14" font-weight="700" fill="#00f2fe" text-anchor="end">
    「 プロフィール・属性解析 」
  </text>
</svg>
