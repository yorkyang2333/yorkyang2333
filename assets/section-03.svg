<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 64" width="100%" height="100%">
  <defs>
    <linearGradient id="bar-bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#111827" />
      <stop offset="100%" stop-color="#0b0f19" />
    </linearGradient>
    <linearGradient id="line-glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="50%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="rgba(0, 242, 254, 0)" />
    </linearGradient>
  </defs>

  <rect width="1000" height="52" y="6" rx="8" fill="url(#bar-bg)" stroke="rgba(168, 85, 247, 0.25)" stroke-width="1" />
  <rect x="0" y="6" width="6" height="52" rx="3" fill="#a855f7" />

  <text x="24" y="37" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="15">
    <tspan font-family="'JetBrains Mono', monospace" font-weight="800" fill="#a855f7">03 // </tspan>
    <tspan font-weight="800" fill="#ffffff" letter-spacing="1">COMBAT TELEMETRY &amp; STATS </tspan>
    <tspan font-family="'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif" font-weight="600" fill="#00f2fe">「 探索統計・同期データ 」</tspan>
  </text>

  <!-- Right Decorative HUD -->
  <line x1="560" y1="32" x2="950" y2="32" stroke="url(#line-glow)" stroke-width="2" />
  <circle cx="960" cy="32" r="4" fill="#00f2fe" />
</svg>
