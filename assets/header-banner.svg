<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" width="100%" height="100%">
  <defs>
    <!-- Background Space & Atmospheric Gradients -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080b12" />
      <stop offset="50%" stop-color="#0f1526" />
      <stop offset="100%" stop-color="#181124" />
    </linearGradient>
    
    <!-- Cyber Sakura Neon Gradients -->
    <linearGradient id="sakura-glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff75a0" />
      <stop offset="50%" stop-color="#ff8fa3" />
      <stop offset="100%" stop-color="#f8a5c2" />
    </linearGradient>

    <linearGradient id="cyan-glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>

    <!-- Frosted Glass Overlay -->
    <linearGradient id="glass-card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(22, 30, 50, 0.75)" />
      <stop offset="100%" stop-color="rgba(15, 20, 35, 0.85)" />
    </linearGradient>

    <!-- Grid Pattern -->
    <pattern id="hud-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255, 117, 160, 0.07)" stroke-width="1" />
    </pattern>

    <pattern id="dots-pattern" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="rgba(0, 242, 254, 0.15)" />
    </pattern>

    <!-- Glow Filter -->
    <filter id="neon-blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Deep Night Sci-Fi Background -->
  <rect width="1200" height="420" fill="url(#bg-grad)" />

  <!-- Atmospheric Glowing Orbs / Cyber Moon -->
  <circle cx="1020" cy="110" r="160" fill="url(#sakura-glow)" opacity="0.12" filter="url(#neon-blur)" />
  <circle cx="180" cy="340" r="200" fill="url(#cyan-glow)" opacity="0.08" filter="url(#neon-blur)" />

  <!-- HUD Grid & Dot Matrix Layer -->
  <rect width="1200" height="420" fill="url(#hud-grid)" />
  <rect x="750" y="40" width="410" height="340" fill="url(#dots-pattern)" opacity="0.6" />

  <!-- Geometric Mecha Accent Lines -->
  <path d="M 0 380 L 120 380 L 160 420 L 0 420 Z" fill="rgba(255, 117, 160, 0.15)" />
  <path d="M 1050 0 L 1200 0 L 1200 60 L 1110 60 Z" fill="rgba(0, 242, 254, 0.12)" />
  <line x1="80" y1="0" x2="80" y2="420" stroke="rgba(255, 255, 255, 0.04)" stroke-width="1" stroke-dasharray="4 4" />
  <line x1="1120" y1="0" x2="1120" y2="420" stroke="rgba(255, 255, 255, 0.04)" stroke-width="1" stroke-dasharray="4 4" />

  <!-- Decorative HUD Corner Crosshairs -->
  <g stroke="rgba(255, 117, 160, 0.5)" stroke-width="1.5">
    <path d="M 45 40 L 45 55 M 37 48 L 53 48" />
    <path d="M 1155 40 L 1155 55 M 1147 48 L 1163 48" />
    <path d="M 45 365 L 45 380 M 37 372 L 53 372" />
    <path d="M 1155 365 L 1155 380 M 1147 372 L 1163 372" />
  </g>

  <!-- Sakura Petals Floating Graphic Vectors -->
  <g fill="#ff75a0" opacity="0.45">
    <path d="M 940 90 C 948 80, 960 85, 955 98 C 950 108, 938 102, 940 90 Z" transform="rotate(15 940 90)" />
    <path d="M 880 160 C 886 152, 895 156, 891 166 C 887 174, 878 169, 880 160 Z" transform="rotate(-25 880 160)" />
    <path d="M 1010 210 C 1018 200, 1030 205, 1025 218 C 1020 228, 1008 222, 1010 210 Z" transform="rotate(40 1010 210)" />
    <path d="M 720 110 C 725 104, 732 107, 729 115 C 726 121, 719 117, 720 110 Z" />
    <path d="M 980 310 C 986 302, 995 306, 991 316 C 987 324, 978 319, 980 310 Z" transform="rotate(65 980 310)" />
  </g>

  <!-- Main Glass HUD Container Card -->
  <rect x="90" y="45" width="1020" height="330" rx="16" fill="url(#glass-card)" stroke="rgba(255, 117, 160, 0.3)" stroke-width="1.5" />

  <!-- Inner Tech Border Lines -->
  <rect x="102" y="57" width="996" height="306" rx="10" fill="none" stroke="rgba(0, 242, 254, 0.15)" stroke-width="1" />

  <!-- Top Frame Cyber Header Bar inside Card -->
  <rect x="130" y="75" width="8" height="24" rx="2" fill="#ff75a0" />
  <text x="148" y="92" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="13" font-weight="700" fill="#00f2fe" letter-spacing="3">
    SYSTEM // SANCTUARY_OS v3.26
  </text>
  <text x="940" y="92" font-family="'JetBrains Mono', monospace" font-size="12" fill="rgba(255, 255, 255, 0.4)" text-anchor="end">
    LINK_STATUS: CONNECTED ●
  </text>

  <!-- Japanese Aesthetic Vertical / Accent Tag -->
  <g transform="translate(980, 125)">
    <rect x="0" y="0" width="64" height="190" rx="6" fill="rgba(255, 117, 160, 0.08)" stroke="rgba(255, 117, 160, 0.25)" stroke-width="1" />
    <text x="32" y="35" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" font-weight="700" fill="#ff75a0" text-anchor="middle">デ</text>
    <text x="32" y="60" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" font-weight="700" fill="#ff75a0" text-anchor="middle">ジ</text>
    <text x="32" y="85" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" font-weight="700" fill="#ff75a0" text-anchor="middle">タ</text>
    <text x="32" y="110" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" font-weight="700" fill="#ff75a0" text-anchor="middle">ル</text>
    <text x="32" y="145" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" font-weight="700" fill="#00f2fe" text-anchor="middle">領</text>
    <text x="32" y="168" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="12" font-weight="700" fill="#00f2fe" text-anchor="middle">域</text>
  </g>

  <!-- Center Title & Japanese Typography -->
  <g transform="translate(140, 175)">
    <!-- Main Japanese Title -->
    <text x="0" y="0" font-family="'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif" font-size="22" font-weight="600" fill="#ff75a0" letter-spacing="4">
      ヨーク・ヤン // 開発者アーカイブ
    </text>

    <!-- Main Bold English Title -->
    <text x="0" y="48" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="44">
      <tspan font-weight="900" fill="#ffffff" letter-spacing="1">YORK YANG </tspan><tspan font-weight="300" fill="#00f2fe">2333</tspan>
    </text>

    <!-- Role / Tagline -->
    <text x="0" y="88" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="15" fill="#cbd5e1" letter-spacing="1.5">
      &gt; AI Research Alchemist &amp; Full-Stack Architect
    </text>
  </g>

  <!-- Bottom HUD Status Bar inside Card -->
  <g transform="translate(140, 315)">
    <rect x="0" y="0" width="130" height="28" rx="4" fill="rgba(255, 117, 160, 0.15)" stroke="rgba(255, 117, 160, 0.4)" stroke-width="1" />
    <text x="65" y="18" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="700" fill="#ff75a0" text-anchor="middle">CLASS : OTAKU</text>

    <rect x="142" y="0" width="160" height="28" rx="4" fill="rgba(0, 242, 254, 0.12)" stroke="rgba(0, 242, 254, 0.35)" stroke-width="1" />
    <text x="222" y="18" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="700" fill="#00f2fe" text-anchor="middle">SYNC RATE : 400%</text>

    <rect x="314" y="0" width="180" height="28" rx="4" fill="rgba(255, 255, 255, 0.05)" stroke="rgba(255, 255, 255, 0.15)" stroke-width="1" />
    <text x="404" y="18" font-family="'JetBrains Mono', monospace" font-size="11" fill="#e2e8f0" text-anchor="middle">LOC : CYBERSPACE // Earth</text>
  </g>
</svg>
