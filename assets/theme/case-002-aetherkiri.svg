  <g font-family="Arial, Helvetica, sans-serif"><text x="52" y="50" fill="#7da6c7" font-size="12" letter-spacing="3">EVIDENCE FILE // CASE 002</text><text x="52" y="91" fill="#f7fbff" font-family="Georgia, serif" font-size="29" font-weight="700">AetherKiri</text><path d="M52 110h445" stroke="#34556e"/><text x="52" y="138" fill="#e1e9ef" font-size="14">A next-generation KiriKiri2 runtime for five platforms,</text><text x="52" y="159" fill="#e1e9ef" font-size="14">rebuilt with Flutter, ANGLE, and zero-copy GPU</text><text x="52" y="180" fill="#e1e9ef" font-size="14">texture sharing.</text><g font-size="12"><rect x="52" y="198" width="86" height="26" rx="13" fill="#142737"/><text x="95" y="216" text-anchor="middle" fill="#9cc0dc">KIRIKIRI2</text><rect x="148" y="198" width="76" height="26" rx="13" fill="#142737"/><text x="186" y="216" text-anchor="middle" fill="#9cc0dc">FLUTTER</text><rect x="234" y="198" width="70" height="26" rx="13" fill="#142737"/><text x="269" y="216" text-anchor="middle" fill="#9cc0dc">ANGLE</text><rect x="314" y="198" width="52" height="26" rx="13" fill="#142737"/><text x="340" y="216" text-anchor="middle" fill="#9cc0dc">C++</text></g><text x="52" y="250" fill="#8295a4" font-size="11" letter-spacing="2">STATUS: IN DEVELOPMENT // OPEN EVIDENCE →</text></g>
