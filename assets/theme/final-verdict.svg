<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="250" viewBox="0 0 1120 250" role="img" aria-labelledby="title desc">
  <title id="title">Final verdict — collaboration admissible</title><desc id="desc">An invitation to collaborate on AI, creative software, visual-novel technology and unusual cross-platform projects.</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#210d16"/><stop offset=".5" stop-color="#08090d"/><stop offset="1" stop-color="#0b1d2b"/></linearGradient><linearGradient id="edge" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#e66f91"/><stop offset="1" stop-color="#6f9bc0"/></linearGradient></defs>
  <rect x="1" y="1" width="1118" height="248" rx="12" fill="url(#bg)" stroke="url(#edge)" stroke-width="2"/>
  <rect x="14" y="14" width="1092" height="222" rx="8" fill="none" stroke="#eadde2" stroke-opacity=".2"/>
  <g text-anchor="middle"><text x="560" y="48" fill="#a8949c" font-family="Arial, sans-serif" font-size="12" letter-spacing="5">WITCH TRIAL // FINAL DELIBERATION</text><text x="560" y="100" fill="#fff8fb" font-family="Georgia, serif" font-size="33" font-weight="700" letter-spacing="4">VERDICT: COLLABORATION ADMISSIBLE</text><path d="M200 121h720" stroke="#8b354d"/><text x="560" y="154" fill="#e7dce0" font-family="Georgia, serif" font-size="16">Bring a case involving AI, creative software, visual-novel technology,</text><text x="560" y="179" fill="#e7dce0" font-family="Georgia, serif" font-size="16">anime media, or a strange cross-platform idea worth investigating.</text><text x="560" y="215" fill="#86a8c3" font-family="Arial, sans-serif" font-size="11" letter-spacing="3">THE COURT WILL REVIEW ALL INTERESTING EVIDENCE</text></g>
</svg>
