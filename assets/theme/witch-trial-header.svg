<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="340" viewBox="0 0 1200 340" role="img" aria-labelledby="title desc">
  <title id="title">York Yang — Magical Girl Witch Trials profile banner</title>
  <desc id="desc">A black, crimson, pink and blue gothic prisoner dossier inspired by Magical Girl Witch Trials.</desc>
  <defs>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ea4d70"/>
      <stop offset="0.5" stop-color="#74233a"/>
      <stop offset="1" stop-color="#3f78a8"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="68%">
      <stop offset="0" stop-color="#30121c"/>
      <stop offset="0.62" stop-color="#09090d"/>
      <stop offset="1" stop-color="#020204"/>
    </radialGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="bars" width="54" height="54" patternUnits="userSpaceOnUse">
      <path d="M12 0v54M42 0v54" stroke="#b7c3d0" stroke-opacity=".055" stroke-width="5"/>
      <path d="M0 12h54M0 42h54" stroke="#b7c3d0" stroke-opacity=".025" stroke-width="2"/>
    </pattern>
  </defs>

  <rect width="1200" height="340" rx="18" fill="url(#glow)"/>
  <rect width="1200" height="340" rx="18" fill="url(#bars)"/>
  <rect x="8" y="8" width="1184" height="324" rx="14" fill="none" stroke="url(#edge)" stroke-width="2"/>
  <rect x="20" y="20" width="1160" height="300" rx="10" fill="none" stroke="#f2dde4" stroke-opacity=".14"/>

  <!-- chains -->
  <g fill="none" stroke="#c8ccd4" stroke-opacity=".18" stroke-width="6">
    <path d="M0 39c84 32 133-29 214 1s132-30 207 0"/>
    <path d="M779 40c76-30 129 30 207 0s132 31 214-1"/>
  </g>

  <!-- owl warden seal -->
  <g transform="translate(600 48)" stroke="#f2dde4" stroke-width="2" fill="#09090d">
    <path d="M-29-2-47-19l6 31c-10 10-15 23-15 38 0 36 24 61 56 61s56-25 56-61c0-15-5-28-15-38l6-31L29-2A63 63 0 0 0-29-2Z"/>
    <circle cx="-20" cy="35" r="14" fill="#ea4d70" filter="url(#softGlow)"/>
    <circle cx="20" cy="35" r="14" fill="#5c91bd" filter="url(#softGlow)"/>
    <circle cx="-20" cy="35" r="5" fill="#09090d"/>
    <circle cx="20" cy="35" r="5" fill="#09090d"/>
    <path d="m0 44-8 10h16Z" fill="#f2dde4"/>
  </g>

  <g text-anchor="middle" font-family="Georgia, 'Times New Roman', serif">
    <text x="600" y="31" fill="#caa8b5" font-size="15" letter-spacing="5">PRISONER DOSSIER // NO. 671</text>
    <text x="600" y="205" fill="#fff7fa" font-size="55" font-weight="700" letter-spacing="13">YORK YANG</text>
    <text x="600" y="238" fill="#ef8aa2" font-size="17" letter-spacing="5">MAGICAL GIRL WITCH TRIALS // DEVELOPER PROFILE</text>
    <text x="600" y="281" fill="#aeb8c4" font-size="13" font-style="italic" letter-spacing="3">TRUST NO CLAIM. VERIFY EVERY CLUE.</text>
  </g>

  <!-- thirteen witch-candidate seals -->
  <g transform="translate(444 307)">
    <g fill="#ea4d70">
      <path d="m0-5 5 5-5 5-5-5Z"/><path d="m26-5 5 5-5 5-5-5Z"/><path d="m52-5 5 5-5 5-5-5Z"/>
      <path d="m78-5 5 5-5 5-5-5Z"/><path d="m104-5 5 5-5 5-5-5Z"/>
    </g>
    <g fill="#f3dbe3">
      <path d="m130-5 5 5-5 5-5-5Z"/><path d="m156-5 5 5-5 5-5-5Z"/><path d="m182-5 5 5-5 5-5-5Z"/>
    </g>
    <g fill="#5c91bd">
      <path d="m208-5 5 5-5 5-5-5Z"/><path d="m234-5 5 5-5 5-5-5Z"/>
      <path d="m260-5 5 5-5 5-5-5Z"/><path d="m286-5 5 5-5 5-5-5Z"/><path d="m312-5 5 5-5 5-5-5Z"/>
    </g>
  </g>
</svg>
