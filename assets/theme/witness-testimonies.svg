<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="315" viewBox="0 0 1120 315" role="img" aria-labelledby="title desc">
  <title id="title">Three witness testimonies</title>
  <desc id="desc">Ema Sakuraba represents empathy, Hiro Nikaido represents rigor, and Sherry Tachibana represents curiosity.</desc>
  <defs><linearGradient id="edge" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#e66f91"/><stop offset=".5" stop-color="#9f334f"/><stop offset="1" stop-color="#6f9bc0"/></linearGradient></defs>
  <rect x="1" y="1" width="1118" height="313" rx="12" fill="#08090d" stroke="url(#edge)" stroke-width="2"/>
  <rect x="14" y="14" width="1092" height="287" rx="8" fill="none" stroke="#eadde2" stroke-opacity=".16"/>
  <text x="560" y="48" text-anchor="middle" fill="#fff8fb" font-family="Georgia, serif" font-size="24" letter-spacing="4">THE THREE TESTIMONIES</text>
  <text x="560" y="73" text-anchor="middle" fill="#9caab7" font-family="Arial, sans-serif" font-size="12" letter-spacing="3">THE RULES BY WHICH THIS LAB IS JUDGED</text>
  <g font-family="Arial, Helvetica, sans-serif">
    <g transform="translate(34 96)">
      <rect width="334" height="184" rx="8" fill="#190d13" stroke="#a64661"/>
      <text x="22" y="35" fill="#ef91aa" font-family="Georgia, serif" font-size="18" font-weight="700">EMA SAKURABA</text>
      <text x="22" y="57" fill="#9e8991" font-size="11" letter-spacing="2">PRISONER NO. 658 // EMPATHY</text>
      <path d="M22 75h290" stroke="#a64661" stroke-opacity=".5"/>
      <text x="22" y="103" fill="#f2e9ec" font-size="14">Kindness matters most where trust is</text>
      <text x="22" y="126" fill="#f2e9ec" font-size="14">dangerous. Build systems that remain</text>
      <text x="22" y="149" fill="#f2e9ec" font-size="14">human even under pressure.</text>
    </g>
    <g transform="translate(393 96)">
      <rect width="334" height="184" rx="8" fill="#160b10" stroke="#8d233e"/>
      <text x="22" y="35" fill="#d7637e" font-family="Georgia, serif" font-size="18" font-weight="700">HIRO NIKAIDO</text>
      <text x="22" y="57" fill="#9e8991" font-size="11" letter-spacing="2">PRISONER NO. 659 // RIGOR</text>
      <path d="M22 75h290" stroke="#8d233e" stroke-opacity=".5"/>
      <text x="22" y="103" fill="#f2e9ec" font-size="14">Justice without evidence is only noise.</text>
      <text x="22" y="126" fill="#f2e9ec" font-size="14">Measure, verify, and make every technical</text>
      <text x="22" y="149" fill="#f2e9ec" font-size="14">decision answer for itself.</text>
    </g>
    <g transform="translate(752 96)">
      <rect width="334" height="184" rx="8" fill="#0b141c" stroke="#507ea3"/>
      <text x="22" y="35" fill="#83add0" font-family="Georgia, serif" font-size="18" font-weight="700">SHERRY TACHIBANA</text>
      <text x="22" y="57" fill="#8799a8" font-size="11" letter-spacing="2">PRISONER NO. 667 // CURIOSITY</text>
      <path d="M22 75h290" stroke="#507ea3" stroke-opacity=".5"/>
      <text x="22" y="103" fill="#e9eef2" font-size="14">The strange clue is usually the useful one.</text>
      <text x="22" y="126" fill="#e9eef2" font-size="14">Follow odd ideas far enough to learn</text>
      <text x="22" y="149" fill="#e9eef2" font-size="14">whether they hide a better tool.</text>
    </g>
  </g>
</svg>
